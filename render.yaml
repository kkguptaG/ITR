# ---------------------------------------------------------------------------
# Render Blueprint — deploys the TallyG Tax stack as a PRIVATE STAGING preview:
#   • a managed PostgreSQL database
#   • the ASP.NET Core 9 API   (Docker, backend/Dockerfile)
#   • the Next.js 14 web app   (Docker, frontend/Dockerfile)
# Connect this repo in Render → New + → Blueprint. See infra/DEPLOY-RENDER.md.
#
# LOCKED-DOWN PRIVATE PREVIEW (not a public launch):
#   • ASPNETCORE_ENVIRONMENT=Production         → devOtp is NOT returned in API responses
#   • Auth__AllowSelfRegistration=false         → public sign-up is closed; only seeded
#                                                  accounts (admin@/demo@itrhelp.com) can log in
#   • the operator reads the login OTP from this service's Render "Logs" tab
#     (look for: [OTP STUB] ... to=admin@itrhelp.com code=######)
# Still pre-ERI and the tax figures are provisional / pending-CA — complete the compliance
# gates (ERI registration, CA sign-off, security/DPDP audit) + wire a real SMS/email OTP
# provider before any public launch.
# ---------------------------------------------------------------------------

databases:
  - name: tallyg-db
    plan: free                 # free Postgres is fine for staging; upgrade for persistence
    databaseName: tallyg
    user: tallyg

services:
  # ---------------- ASP.NET Core API ----------------
  - type: web
    name: tallyg-api
    runtime: docker
    plan: free                 # free web service (spins down when idle; ~30s cold start)
    region: singapore          # closest Render region to India for staging
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production        # LOCKED DOWN: devOtp is NOT returned in API responses
      - key: ASPNETCORE_URLS
        value: http://+:10000    # Render routes to port 10000 by default
      - key: Database__Provider
        value: Postgres
      - key: ConnectionStrings__Default
        fromDatabase:
          name: tallyg-db
          property: connectionString   # postgresql:// URI — normalized to Npgsql format in code
      - key: Auth__AllowSelfRegistration
        value: "false"           # no public self-registration; only the seeded accounts can sign in
      - key: Auth__Jwt__SigningKey
        generateValue: true            # Render generates + stores a strong key (signs AND validates JWTs)
      - key: Auth__Jwt__Issuer
        value: https://api.itrhelp.com
      - key: Auth__Jwt__Audience
        value: https://itrhelp.com
      - key: Cors__Origins__0
        value: https://itrhelp.com
      - key: Cors__Origins__1
        value: https://www.itrhelp.com

  # ---------------- Next.js web ----------------
  - type: web
    name: tallyg-web
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    autoDeploy: true
    envVars:
      # Baked into the client bundle at build time (matches ARG NEXT_PUBLIC_API_URL in the Dockerfile).
      - key: NEXT_PUBLIC_API_URL
        value: https://api.itrhelp.com/api/v1
